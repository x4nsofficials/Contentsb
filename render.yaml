services:
  - type: web
    name: storybizz-preview
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /status
    disk:
      name: storybizz-data
      mountPath: /data
      sizeGB: 5
    envVars:
      - key: DATA_DIR
        value: /data
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ADMIN_TOKEN
        sync: false
